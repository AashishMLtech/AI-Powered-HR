services:
  backend:
    build: ../backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env.example
    volumes:
      - ../backend:/app
      - ../uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: hr_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
